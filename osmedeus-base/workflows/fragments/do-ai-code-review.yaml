# =============================================================================
# AI 代码审计模块 - 优化版
# =============================================================================
# 功能：
# - 使用外部 Agent 配置文件 (security-code-reviewer.md)
# - 支持多种 Agent (iflow/claude-code/codex)
# - 串行仓库扫描 (逐个处理，不支持并发)
# =============================================================================

kind: module
name: ai-code-review
description: AI-powered security code review with external config support

params:
  - name: repoFolder
    default: "{{Output}}/.tmp/github_repos"
  - name: codeOutputDir
    default: "{{Output}}/code"
  - name: codeReviewReport
    default: "{{Output}}/ai-analysis/code-review-{{TargetSpace}}.md"
  - name: jsonOutput
    default: "{{Output}}/ai-analysis/code-review-{{TargetSpace}}.json"
  - name: enableCodeReview
    type: bool
    default: true
  - name: codeReviewAgent
    default: "iflow"
  - name: maxIterations
    type: integer
    default: 15
  - name: maxReposToScan
    type: integer
    default: 5
  - name: securityReviewPrompt
    default: "{{ExternalAgents}}/security-code-reviewer.md"

steps:
  - name: detect-repos
    type: bash
    pre_condition: "{{enableCodeReview}}"
    command: |
      mkdir -p {{Output}}/ai-analysis 2>/dev/null
      
      REPO_DIRS="{{repoFolder}}|{{codeOutputDir}}/github"
      > {{Output}}/ai-analysis/all-repos.txt
      
      for DIR in $(echo "$REPO_DIRS" | tr '|' ' '); do
        if [ -d "$DIR" ]; then
          find "$DIR" -maxdepth 1 -type d -not -name "$(basename "$DIR")" 2>/dev/null >> {{Output}}/ai-analysis/all-repos.txt
        fi
      done
      
      sort -u {{Output}}/ai-analysis/all-repos.txt -o {{Output}}/ai-analysis/all-repos.txt 2>/dev/null || true
      head -{{maxReposToScan}} {{Output}}/ai-analysis/all-repos.txt > {{Output}}/ai-analysis/repo-list.txt 2>/dev/null || true
      
      FINAL=$(wc -l < {{Output}}/ai-analysis/repo-list.txt 2>/dev/null || echo 0)
      echo "$FINAL" > {{Output}}/ai-analysis/repo-count.txt
      echo "[Code Review] Found $FINAL repos"

  - name: load-system-prompt
    type: bash
    pre_condition: "{{enableCodeReview}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      
      if [ -f "{{securityReviewPrompt}}" ]; then
        cp "{{securityReviewPrompt}}" {{Output}}/ai-analysis/system-prompt.md
      else
        echo "You are a senior security engineer." > {{Output}}/ai-analysis/system-prompt.md
      fi
      
      echo "[System Prompt] Loaded"

  - name: ai-code-review
    type: agent-acp
    pre_condition: "{{enableCodeReview}} && $(cat {{Output}}/ai-analysis/repo-count.txt 2>/dev/null || echo 0) > 0"
    agent: "{{codeReviewAgent}}"
    cwd: "{{repoFolder}}"
    allowed_paths:
      - "{{repoFolder}}"
      - "{{codeOutputDir}}"
      - "{{Output}}"
    max_iterations: 15
    timeout: "30m"
    acp_config:
      write_enabled: false
    on_error:
      - action: continue
    messages:
      - role: system
        content: "{{read_file('{{securityReviewPrompt}}')}}"
      - role: user
        content: "Review ALL repositories in current directory for security vulnerabilities. For each repo: identify vulnerabilities, categorize by severity (Critical/High/Medium/Low), provide file path, line number, vulnerability type, description, and remediation. Output markdown grouped by repository, sorted by severity."
    exports:
      code_review_result: "{{acp_output}}"

  - name: save-report
    type: bash
    pre_condition: "{{enableCodeReview}}"
    command: |
      mkdir -p {{Output}}/ai-analysis
      REPO_COUNT=$(cat {{Output}}/ai-analysis/repo-count.txt 2>/dev/null || echo 0)
      
      printf '# AI Security Code Review Report\n\n' > {{codeReviewReport}}
      printf '## Scan Info\n' >> {{codeReviewReport}}
      printf '- Target: %s\n' "{{Target}}" >> {{codeReviewReport}}
      printf '- Date: %s\n' "$(date '+%Y-%m-%d %H:%M:%S')" >> {{codeReviewReport}}
      printf '- Agent: %s\n' "{{codeReviewAgent}}" >> {{codeReviewReport}}
      printf '- Repos: %s\n\n' "$REPO_COUNT" >> {{codeReviewReport}}
      printf '---\n\n' >> {{codeReviewReport}}
      printf '## Findings\n\n' >> {{codeReviewReport}}

      printf '%s\n' '{{code_review_result}}' >> {{codeReviewReport}}
      
      printf '\n---\n\n' >> {{codeReviewReport}}
      printf '*Generated by AI Code Review*\n' >> {{codeReviewReport}}
      
      echo "[Code Review] Report saved"

  - name: save-json
    type: bash
    pre_condition: "{{enableCodeReview}}"
    command: |
      REPO_COUNT=$(cat {{Output}}/ai-analysis/repo-count.txt 2>/dev/null || echo 0)
      TIMESTAMP=$(date -Iseconds)
      
      printf '{"target": "%s", "agent": "%s", "timestamp": "%s", "repo_count": %s, "findings": []}\n'  "{{Target}}" "{{codeReviewAgent}}" "$TIMESTAMP" "$REPO_COUNT" > {{jsonOutput}}
      
      echo "[Code Review] JSON saved"

  - name: no-repos-fallback
    type: agent-acp
    pre_condition: "{{enableCodeReview}} && $(cat {{Output}}/ai-analysis/repo-count.txt 2>/dev/null || echo 1) == 0"
    agent: "{{codeReviewAgent}}"
    cwd: "{{Output}}"
    allowed_paths:
      - "{{Output}}"
    max_iterations: 3
    on_error:
      - action: continue
    messages:
      - role: system
        content: "You are a security analysis assistant."
      - role: user
        content: "No source code found for {{Target}}. Provide alternative security assessment recommendations."
    exports:
      fallback_result: "{{acp_output}}"

  - name: log-complete
    type: function
    pre_condition: "{{enableCodeReview}}"
    functions:
      - 'log_info("AI Code Review done - repos: $(cat {{Output}}/ai-analysis/repo-count.txt 2>/dev/null || echo 0)")'
