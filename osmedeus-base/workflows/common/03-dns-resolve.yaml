# =============================================================================
# Module Workflow: DNS Resolution and IP Space
# =============================================================================
# 合并: probe-dns.yaml + enum-ipspace.yaml
# 功能: DNS 解析、DNS 暴力破解、IP 空间分析
# 注意: HTTP 探测已移至 04-http-probe.yaml
# =============================================================================

kind: module
name: dns-resolve
description: DNS resolution, bruteforce, and IP space analysis
tags: dns, probing, resolution, ipspace, asn

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  # 功能开关
  - name: enableDnsBruteForcing
    type: bool
    default: true
  - name: enablePermutation
    type: bool
    default: true
  - name: enableIaPermutation
    type: bool
    default: true
    description: "AI-powered subdomain permutation (subwiz)"
  - name: enableRegexPermutation
    type: bool
    default: true
    description: "Regex-based subdomain permutation (regulator)"
  - name: enableTlsIpPivots
    type: bool
    default: true
  - name: enableZoneTransfer
    type: bool
    default: true
    description: "Enable DNS Zone Transfer (AXFR) check"
  - name: enableDeepWildcardFilter
    type: bool
    default: false
    description: "Enable deep wildcard detection (multi-iteration)"
  - name: enableSrvEnum
    type: bool
    default: true
    description: "Enable SRV record enumeration"
  - name: enablePtrSweep
    type: bool
    default: false
    description: "Enable PTR sweep over ASN CIDRs"
  - name: enableDnsRecordExtract
    type: bool
    default: true
    description: "Enable DNS record extraction (TXT, MX, NS, CNAME)"
  - name: enableRecursiveBrute
    type: bool
    default: false
    description: "Enable recursive bruteforce (resource intensive)"
  - name: enableAsnAutoDiscover
    type: bool
    default: true
    description: "Enable automatic ASN discovery from domain"
  - name: enableNsDelegation
    type: bool
    default: true
    description: "Enable NS delegation check and AXFR on delegated subdomains"
  - name: enableGeoInfo
    type: bool
    default: true
    description: "Enable GeoIP information lookup for discovered IPs"

  # 组织信息 (用于 ASN/IP 范围发现)
  - name: Org
    type: string
    default: ""
    description: "Organization name for ASN/IP range discovery (metabigor)"

  # 输入文件
  - name: subdomainFile
    default: "{{Output}}/subdomain/subdomain-{{TargetSpace}}.txt"

  # 输出文件
  - name: dnsFile
    default: "{{Output}}/probing/dns-{{TargetSpace}}.txt"
  - name: nonwildFile
    default: "{{Output}}/probing/nonwild-{{TargetSpace}}.txt"
  - name: resolvedFile
    default: "{{Output}}/probing/resolved-{{TargetSpace}}.txt"
  - name: ipFile
    default: "{{Output}}/ipspace/ip-{{TargetSpace}}.txt"
  - name: nonCdnIPFile
    default: "{{Output}}/ipspace/non-cdn-ip-{{TargetSpace}}.txt"
  - name: axfrOutputFile
    default: "{{Output}}/probing/axfr-{{TargetSpace}}.txt"
  - name: wildcardsFile
    default: "{{Output}}/probing/wildcards-{{TargetSpace}}.txt"
  - name: srvFile
    default: "{{Output}}/probing/srv-{{TargetSpace}}.txt"
  - name: ptrSweepFile
    default: "{{Output}}/subdomain/ptr-sweep-{{TargetSpace}}.txt"
  - name: dnsRecordsFile
    default: "{{Output}}/subdomain/dns-records-{{TargetSpace}}.json"
  - name: dnsExtractedSubsFile
    default: "{{Output}}/subdomain/dns-extracted-{{TargetSpace}}.txt"
  - name: recursiveBruteFile
    default: "{{Output}}/subdomain/recursive-brute-{{TargetSpace}}.txt"
  - name: asnAutoFile
    default: "{{Output}}/ipspace/asn-auto-{{TargetSpace}}.json"
  - name: nsDelegatedZonesFile
    default: "{{Output}}/subdomain/ns-delegated-{{TargetSpace}}.txt"
  - name: nsAxfrSubsFile
    default: "{{Output}}/subdomain/ns-axfr-subs-{{TargetSpace}}.txt"
  - name: geoInfoFile
    default: "{{Output}}/ipspace/geo-info-{{TargetSpace}}.txt"

  # Wordlists
  - name: dnsBruteForceWordlist
    default: "{{ExternalData}}/wordlists/dns/small.txt"
  - name: permWordlists
    default: "{{ExternalData}}/wordlists/dns/altdns.txt"
  - name: trustedResolvers
    default: "{{ExternalData}}/mics/trusted-resolvers.txt"

  # 线程和速率
  - name: massdnsRateBrute
    default: "{{ threads * 50 }}"
  - name: wildcardTests
    default: "{{ threads * 3 }}"
  - name: deepWildcardIterations
    default: 5
    description: "Max iterations for deep wildcard detection"

  # 限制
  - name: permLimit
    default: "8000"
  - name: ptrSweepMaxIPs
    default: 50000
    description: "Max IPs for PTR sweep (safety limit)"

  # 超时
  - name: ipTimeout
    default: "2h"

  # Shodan
  - name: enableShodanScan
    type: bool
    default: true
    description: "Enable Shodan passive port scanning via internetdb"
  - name: shodanOutput
    default: "{{Output}}/ipspace/shodan-ports-{{TargetSpace}}.json"

  # TLS IP pivots
  - name: tlsIpPorts
    default: "443"
  - name: tlsIpCertsFile
    default: "{{Output}}/ipspace/tls-ip-certs-{{TargetSpace}}.jsonl"
  - name: tlsIpHostsFile
    default: "{{Output}}/subdomain/tls-ip-hosts-{{TargetSpace}}.txt"

# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - puredns
    - metabigor
    - jq
    - subwiz
    - dnsx
    - hakip2host
    - asnmap
    - gotator
    - tlsx
    - anew
    - unfurl
    - prips
    - dsieve
    - cdncheck
  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: dns-results
    path: "{{dnsFile}}"
    type: text
    description: DNS resolution results

  - name: resolved-hosts
    path: "{{resolvedFile}}"
    type: text
    description: Resolved hostnames

  - name: ip-list
    path: "{{ipFile}}"
    type: text
    description: List of discovered IP addresses

  - name: non-cdn-ip-list
    path: "{{nonCdnIPFile}}"
    type: text
    description: List of non-CDN IP addresses

  - name: shodan-ports
    path: "{{shodanOutput}}"
    type: json
    description: Shodan InternetDB port scan results

  - name: zone-transfer-results
    path: "{{axfrOutputFile}}"
    type: text
    description: DNS Zone Transfer (AXFR) results

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  # ===========================================================================
  # Setup
  # ===========================================================================
  - name: create-output-folders
    type: function
    log: "Creating output folders"
    functions:
      - 'create_folder("{{Output}}/probing")'
      - 'create_folder("{{Output}}/ipspace")'

  # ===========================================================================
  # Phase 1: DNS Resolution
  # ===========================================================================
  - name: resolve-dns
    type: function
    pre_condition: 'file_exists("{{subdomainFile}}")'
    log: "Resolving DNS with puredns"
    functions:
      - 'exec_cmd("puredns resolve {{subdomainFile}} --write {{nonwildFile}} --write-massdns {{dnsFile}} --write-wildcards {{Output}}/probing/wildcards-{{TargetSpace}}.txt --wildcard-tests {{wildcardTests}} --rate-limit {{massdnsRateBrute}} --rate-limit-trusted {{massdnsRateBrute}} >/dev/null 2>&1")'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 2: Deep Wildcard Filter (multi-iteration)
  # ===========================================================================
  - name: deep-wildcard-filter
    type: bash
    pre_condition: '{{enableDeepWildcardFilter}} && file_exists("{{subdomainFile}}")'
    log: "Running deep wildcard detection (multi-iteration)"
    command: |
      if [ -s "{{subdomainFile}}" ]; then
        cp {{subdomainFile}} {{Output}}/probing/dwf_working.txt
        iteration=0
        wildcards_found=1
        
        while [ $wildcards_found -gt 0 ] && [ $iteration -lt {{deepWildcardIterations}} ]; do
          iteration=$((iteration + 1))
          wildcards_found=0
          
          # Extract parent domains
          : > {{Output}}/probing/dwf_parents.txt
          while IFS= read -r subdomain; do
            [ "$subdomain" = "{{Target}}" ] && continue
            parent="${subdomain#*.}"
            if [[ "$parent" == *".{{Target}}" ]] || [ "$parent" = "{{Target}}" ]; then
              echo "$parent" >> {{Output}}/probing/dwf_parents.txt
            fi
          done < {{Output}}/probing/dwf_working.txt
          
          # Get unique parents and remove already known wildcards
          sort -u {{Output}}/probing/dwf_parents.txt -o {{Output}}/probing/dwf_parents_unique.txt
          [ -s "{{wildcardsFile}}" ] && grep -v -F -f "{{wildcardsFile}}" {{Output}}/probing/dwf_parents_unique.txt > {{Output}}/probing/dwf_parents_check.txt 2>/dev/null || cp {{Output}}/probing/dwf_parents_unique.txt {{Output}}/probing/dwf_parents_check.txt
          grep -v "^{{Target}}$" {{Output}}/probing/dwf_parents_check.txt > {{Output}}/probing/dwf_parents_final.txt 2>/dev/null || true
          
          [ ! -s "{{Output}}/probing/dwf_parents_final.txt" ] && break
          
          # Generate random probe hostnames
          : > {{Output}}/probing/dwf_probes.txt
          while IFS= read -r parent; do
            random_str=$(head -c 100 /dev/urandom 2>/dev/null | LC_ALL=C tr -dc 'a-z0-9' | head -c 12)
            echo "${random_str}.${parent}" >> {{Output}}/probing/dwf_probes.txt
          done < {{Output}}/probing/dwf_parents_final.txt
          
          # Test random probes for wildcard
          if [ -s "{{Output}}/probing/dwf_probes.txt" ]; then
            dnsx -silent -retry 2 -r {{trustedResolvers}} < {{Output}}/probing/dwf_probes.txt > {{Output}}/probing/dwf_resolved.txt 2>/dev/null || true
            
            if [ -s "{{Output}}/probing/dwf_resolved.txt" ]; then
              while IFS= read -r resolved_probe; do
                wildcard_parent="${resolved_probe#*.}"
                echo "$wildcard_parent" >> {{Output}}/probing/dwf_new_wildcards.txt
                wildcards_found=$((wildcards_found + 1))
              done < {{Output}}/probing/dwf_resolved.txt
              
              if [ -s "{{Output}}/probing/dwf_new_wildcards.txt" ]; then
                sort -u {{Output}}/probing/dwf_new_wildcards.txt >> {{wildcardsFile}}
                sort -u {{wildcardsFile}} -o {{wildcardsFile}}
                rm -f {{Output}}/probing/dwf_new_wildcards.txt
                
                # Filter out subdomains under wildcard parents
                awk '{print "\\." $0 "$"; print "^" $0 "$"}' {{wildcardsFile}} > {{Output}}/probing/dwf_grep_patterns.txt
                grep -vEf {{Output}}/probing/dwf_grep_patterns.txt {{Output}}/probing/dwf_working.txt > {{Output}}/probing/dwf_filtered.txt 2>/dev/null || true
                mv {{Output}}/probing/dwf_filtered.txt {{Output}}/probing/dwf_working.txt
              fi
            fi
          fi
        done
        
        # Copy filtered results back
        cp {{Output}}/probing/dwf_working.txt {{subdomainFile}}
        rm -f {{Output}}/probing/dwf_*.txt
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 3: DNS Zone Transfer (AXFR) Check
  # ===========================================================================
  - name: dns-zone-transfer
    type: bash
    pre_condition: '{{enableZoneTransfer}}'
    log: "Checking DNS Zone Transfer (AXFR)"
    command: |
      : > {{axfrOutputFile}}
      for ns in $(dig +short NS {{Target}} 2>/dev/null | head -10); do
        result=$(dig AXFR {{Target}} @$ns 2>/dev/null)
        if echo "$result" | grep -qE "XFR|transfer|IN.*A|IN.*CNAME"; then
          echo "=== Zone Transfer SUCCESS on $ns ===" >> {{axfrOutputFile}}
          echo "$result" | grep -E "IN\s+(A|CNAME|MX|TXT|NS)" >> {{axfrOutputFile}}
          # Extract subdomains from AXFR results
          echo "$result" | grep -oE "^[_a-zA-Z0-9-]+\." | sed "s/\.$//" >> {{Output}}/subdomain/axfr-subs-{{TargetSpace}}.txt
        fi
      done
      # Merge AXFR subdomains into main subdomain file
      if [ -f "{{Output}}/subdomain/axfr-subs-{{TargetSpace}}.txt" ] && [ -s "{{Output}}/subdomain/axfr-subs-{{TargetSpace}}.txt" ]; then
        cat {{Output}}/subdomain/axfr-subs-{{TargetSpace}}.txt | sort -u >> {{subdomainFile}} 2>/dev/null || true
        rm -f {{Output}}/subdomain/axfr-subs-{{TargetSpace}}.txt 2>/dev/null || true
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 3a: NS Delegation Check (sub_ns_delegation equivalent)
  # ===========================================================================
  - name: ns-delegation-scan
    type: bash
    pre_condition: '{{enableNsDelegation}} && file_exists("{{subdomainFile}}")'
    log: "Checking NS delegation and attempting AXFR on delegated subdomains"
    command: |
      : > {{nsDelegatedZonesFile}}
      : > {{nsAxfrSubsFile}}
      
      # Normalize target for comparison (remove trailing dot)
      TARGET_NORMALIZED="{{Target}}"
      TARGET_NORMALIZED="${TARGET_NORMALIZED%.}"
      
      # Check NS records for each known subdomain using dnsx with JSON output
      if [ -s "{{subdomainFile}}" ]; then
        dnsx -ns -resp -silent -retry 2 -r {{trustedResolvers}} -json < {{subdomainFile}} 2>/dev/null > {{Output}}/subdomain/ns-delegation-raw-{{TargetSpace}}.jsonl || true
        
        if [ -s "{{Output}}/subdomain/ns-delegation-raw-{{TargetSpace}}.jsonl" ]; then
          while IFS= read -r line; do
            # Extract subdomain from JSON (host field) and remove trailing dot
            sub=$(echo "$line" | jq -r '.host // .host_name // empty' 2>/dev/null | sed 's/\.$//')
            # Skip empty, null, or base domain
            [ -z "$sub" ] && continue
            [ "$sub" = "null" ] && continue
            
            # Skip the base domain itself (already checked by dns-zone-transfer)
            if [ "$sub" = "$TARGET_NORMALIZED" ]; then
              continue
            fi
            
            # Extract NS records from JSON response
            ns_list=$(echo "$line" | jq -r '.ns[]? // .nameservers[]? // empty' 2>/dev/null)
            
            if [ -n "$ns_list" ] && [ "$ns_list" != "null" ]; then
              echo "$sub" >> {{nsDelegatedZonesFile}}
              # Attempt AXFR on each delegated NS (with 5s timeout per NS)
              while IFS= read -r ns; do
                [ -z "$ns" ] && continue
                [ "$ns" = "null" ] && continue
                # Remove trailing dot from NS if present
                ns="${ns%.}"
                timeout 5 dig axfr "$sub" @"$ns" +short 2>/dev/null | awk '{print $1}' | sed 's/\.$//' | sed '/^$/d' >> {{nsAxfrSubsFile}} || true
              done <<< "$ns_list"
            fi
          done < {{Output}}/subdomain/ns-delegation-raw-{{TargetSpace}}.jsonl
          
          # Clean up temp file
          rm -f {{Output}}/subdomain/ns-delegation-raw-{{TargetSpace}}.jsonl
        fi
      fi
      
      # Filter and merge AXFR results - match target domain
      if [ -s "{{nsAxfrSubsFile}}" ]; then
        grep -E '^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$' {{nsAxfrSubsFile}} 2>/dev/null | grep -E "\.{{Target}}$" | sort -u >> {{subdomainFile}} || true
      fi
      
      # Sort delegated zones
      if [ -s "{{nsDelegatedZonesFile}}" ]; then
        sort -u {{nsDelegatedZonesFile}} -o {{nsDelegatedZonesFile}}
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 3b: GeoIP Information Lookup
  # ===========================================================================
  - name: geo-info-lookup
    type: bash
    pre_condition: '{{enableGeoInfo}} && file_exists("{{ipFile}}")'
    log: "Looking up GeoIP information for discovered IPs"
    command: |
      : > {{geoInfoFile}}
      
      # Use ipinfo.io API for geo lookup (limit to first 500 IPs, 10 concurrent)
      if [ -s "{{ipFile}}" ]; then
        head -n 500 {{ipFile}} | xargs -P 10 -I {} curl -s "https://ipinfo.io/widget/demo/{}" 2>/dev/null >> {{geoInfoFile}} || true
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 4: DNS Bruteforce
  # ===========================================================================
  - name: dns-bruteforce
    type: function
    pre_condition: '{{enableDnsBruteForcing}}'
    log: "Running DNS bruteforce with puredns"
    functions:
      - 'exec_cmd("puredns bruteforce {{dnsBruteForceWordlist}} {{Target}} --wildcard-tests {{wildcardTests}} -w {{Output}}/probing/subbrute-{{TargetSpace}}.txt >/dev/null 2>&1")'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 5: Permutation DNS
  # ===========================================================================
  - name: generate-permutations
    type: function
    pre_condition: 'file_length("{{subdomainFile}}") <= {{permLimit}} && {{enablePermutation}} && {{enableDnsBruteForcing}}'
    log: "Generating permutation subdomains"
    functions:
      - 'exec_cmd("cat {{subdomainFile}} | alterx -silent >> {{Output}}/probing/permutation-{{TargetSpace}}.txt")'
      - 'sort_unix("{{Output}}/probing/permutation-{{TargetSpace}}.txt")'
      - 'exec_cmd("puredns resolve {{Output}}/probing/permutation-{{TargetSpace}}.txt --wildcard-tests {{wildcardTests}} -w {{Output}}/probing/permutations-{{TargetSpace}}.txt >/dev/null 2>&1")'
      - 'exec_cmd("rm -rf {{Output}}/probing/permutation-{{TargetSpace}}.txt")'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 6: AI-Powered Permutation (subwiz)
  # ===========================================================================
  - name: ai-permutations
    type: function
    pre_condition: 'file_length("{{subdomainFile}}") <= {{permLimit}} && {{enableIaPermutation}}'
    log: "Generating AI-powered permutation subdomains (subwiz)"
    functions:
      - 'exec_cmd("subwiz -i {{subdomainFile}} --no-resolve -o {{Output}}/probing/subwiz-{{TargetSpace}}.txt 2>/dev/null")'
      - 'exec_cmd("if [ -s \"{{Output}}/probing/subwiz-{{TargetSpace}}.txt\" ]; then puredns resolve {{Output}}/probing/subwiz-{{TargetSpace}}.txt --wildcard-tests {{wildcardTests}} -w {{Output}}/probing/subwiz-resolved-{{TargetSpace}}.txt >/dev/null 2>&1; fi")'
      - 'exec_cmd("rm -rf {{Output}}/probing/subwiz-{{TargetSpace}}.txt")'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 6a: Regex-Based Permutation (regulator)
  # ===========================================================================
  - name: regex-permutations
    type: bash
    pre_condition: 'file_length("{{subdomainFile}}") <= {{permLimit}} && {{enableRegexPermutation}}'
    log: "Generating regex-based permutation subdomains (regulator)"
    command: |
      : > {{Output}}/probing/regulator-{{TargetSpace}}.txt
      : > {{Output}}/probing/regulator-resolved-{{TargetSpace}}.txt

      # Run regulator to generate permutations
      regulator -t {{Target}} -f {{subdomainFile}} -o {{Output}}/probing/regulator-{{TargetSpace}}.txt 2>/dev/null || true

      if [ -s "{{Output}}/probing/regulator-{{TargetSpace}}.txt" ]; then
        puredns resolve {{Output}}/probing/regulator-{{TargetSpace}}.txt --wildcard-tests {{wildcardTests}} -w {{Output}}/probing/regulator-resolved-{{TargetSpace}}.txt >/dev/null 2>&1 || true
        count=$(wc -l < {{Output}}/probing/regulator-resolved-{{TargetSpace}}.txt 2>/dev/null || echo 0)
        echo "[REGULATOR] Resolved $count regex-based permutations"
      fi

      rm -f {{Output}}/probing/regulator-{{TargetSpace}}.txt 2>/dev/null || true
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 7: Merge DNS Results
  # ===========================================================================
  - name: merge-dns-results
    type: function
    log: "Merging DNS results"
    functions:
      - 'exec_cmd("cat {{Output}}/probing/subbrute-{{TargetSpace}}.txt {{Output}}/probing/permutations-{{TargetSpace}}.txt {{Output}}/probing/subwiz-resolved-{{TargetSpace}}.txt {{Output}}/probing/regulator-resolved-{{TargetSpace}}.txt 2>/dev/null | sort -u > {{Output}}/probing/brute-perm-{{TargetSpace}}.txt")'
      - 'exec_cmd("if [ -s \"{{Output}}/probing/brute-perm-{{TargetSpace}}.txt\" ]; then puredns resolve {{Output}}/probing/brute-perm-{{TargetSpace}}.txt --wildcard-tests {{wildcardTests}} -w {{Output}}/probing/resolved-brute-perm-{{TargetSpace}}.txt --rate-limit {{massdnsRateBrute}} >/dev/null 2>&1 || true; fi")'
      - 'exec_cmd("cat {{nonwildFile}} {{Output}}/probing/resolved-brute-perm-{{TargetSpace}}.txt 2>/dev/null | sort -u > {{resolvedFile}} || cat {{nonwildFile}} 2>/dev/null > {{resolvedFile}}")'
      - 'sort_unix("{{dnsFile}}")'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 8: IP Space Analysis
  # ===========================================================================
  - name: asn-discovery
    type: bash
    log: "Discovering ASN and IP ranges based on Organization name"
    pre_condition: 'typeof Org !== "undefined" && Org !== ""'
    command: |
      echo "{{Org}}" | timeout -k 1m {{ipTimeout}} metabigor net --org -o {{Output}}/ipspace/{{TargetSpace}}-range.txt 2>/dev/null || true
    on_error: 
      - action: continue

  - name: ip-summary
    type: bash
    pre_condition: 'file_exists("{{dnsFile}}")'
    log: "Getting IP summary from discovered hosts"
    command: |
      awk '$2=="A" {print $3}' {{dnsFile}} | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | sort -u | head -50 | while read ip; do echo "$ip" | metabigor ipc --json 2>/dev/null >> {{Output}}/ipspace/ip-summary-{{TargetSpace}}.jsonl || true; done
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 9: Process IP Results
  # ===========================================================================
  - name: process-ip-results
    type: bash
    log: "Processing IP results"
    command: |
      awk '$2=="A" {print $3}' {{dnsFile}} | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | sort -u >> {{ipFile}} 2>/dev/null || true
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 10: CDN Detection
  # ===========================================================================
  - name: detect-cdn-providers
    type: bash
    pre_condition: 'file_exists("{{ipFile}}") && file_length("{{ipFile}}") > 0'
    log: "Detecting CDN/WAF providers"
    command: 'cdncheck -silent -resp -cdn -waf -nc < {{ipFile}} > {{Output}}/ipspace/cdn_providers-{{TargetSpace}}.txt 2>/dev/null || true'
    on_error:
      - action: continue

  - name: extract-non-cdn-ips
    type: bash
    pre_condition: 'file_exists("{{ipFile}}") && file_exists("{{Output}}/ipspace/cdn_providers-{{TargetSpace}}.txt")'
    log: "Extracting non-CDN IPs"
    command: 'comm -23 <(sort -u {{ipFile}}) <(cut -d"[" -f1 {{Output}}/ipspace/cdn_providers-{{TargetSpace}}.txt | sed "s/[[:space:]]*$//" | sort -u) > {{nonCdnIPFile}} 2>/dev/null || true'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 11: TLS IP Pivots (extract domains from TLS certs)
  # ===========================================================================
  - name: tls-ip-pivots-scan
    type: bash
    log: "Extracting hostnames from TLS certificates on IPs"
    pre_condition: '{{enableTlsIpPivots}} && file_exists("{{ipFile}}")'
    command: 'cat {{ipFile}} | tlsx -san -cn -silent -ro -resp-only -p {{tlsIpPorts}} -c {{threads}} -json > {{tlsIpCertsFile}} 2>/dev/null || true'

  - name: process-tls-certs
    type: bash
    log: "Processing TLS certificate results"
    pre_condition: 'file_exists("{{tlsIpCertsFile}}") && file_length("{{tlsIpCertsFile}}") > 0'
    command: 'jq -r "(.subject_cn // empty), (.subject_an[]? // empty)" {{tlsIpCertsFile}} 2>/dev/null | sed -e "s/^\.//" -e "s/\.$//" | grep -E "^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$" | sort -u > {{tlsIpHostsFile}} || true'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 12: Shodan Passive Port Scan
  # ===========================================================================
  - name: shodan-port-scan
    type: function
    pre_condition: "{{enableShodanScan}}"
    log: "Scanning IPs with Shodan InternetDB"
    functions:
      - 'exec_cmd(": > {{shodanOutput}}")'
      - 'exec_cmd("if [ -s \"{{ipFile}}\" ]; then cat {{ipFile}} | while read ip; do curl -s \"https://internetdb.shodan.io/${ip}\" 2>/dev/null >> {{shodanOutput}}; echo \"\" >> {{shodanOutput}}; done; fi")'
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 13: SRV Record Enumeration
  # ===========================================================================
  - name: srv-enum
    type: bash
    pre_condition: '{{enableSrvEnum}}'
    log: "Enumerating SRV records for service discovery"
    command: |
      : > {{srvFile}}
      # Common SRV service prefixes
      services="_ldap._tcp _kerberos._tcp _kerberos._udp _xmpp-server._tcp _xmpp-client._tcp _imap._tcp _imaps._tcp _pop3._tcp _pop3s._tcp _smtp._tcp _sip._tcp _sip._udp _stun._tcp _stun._udp _h323cs._tcp _h323cs._udp _ftp._tcp _ssh._tcp _sips._tcp _sipfederationtls._tcp _gc._tcp _gc._udp _kerberos._tcp._dc _ldap._tcp._dc _kerberos._tcp.dc._msdcs _ldap._tcp.dc._msdcs _autodiscover._tcp"
      
      for svc in $services; do
        result=$(dig +short ${svc}.{{Target}} SRV 2>/dev/null)
        if [ -n "$result" ]; then
          echo "${svc}.{{Target}} => $result" >> {{srvFile}}
          # Extract hostnames from SRV records
          echo "$result" | awk '{print $4}' | sed 's/\.$//' | grep -E "{{Target}}$" >> {{Output}}/subdomain/srv-subs-{{TargetSpace}}.txt
        fi
      done
      
      # Merge SRV subdomains into main file
      if [ -f "{{Output}}/subdomain/srv-subs-{{TargetSpace}}.txt" ] && [ -s "{{Output}}/subdomain/srv-subs-{{TargetSpace}}.txt" ]; then
        sort -u {{Output}}/subdomain/srv-subs-{{TargetSpace}}.txt >> {{subdomainFile}} 2>/dev/null || true
        rm -f {{Output}}/subdomain/srv-subs-{{TargetSpace}}.txt
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 14: PTR Sweep over ASN CIDRs
  # ===========================================================================
  - name: ptr-sweep
    type: bash
    pre_condition: '{{enablePtrSweep}} && file_exists("{{Output}}/ipspace/{{TargetSpace}}-range.txt")'
    log: "Running PTR sweep over ASN CIDRs (may be slow)"
    command: |
      : > {{ptrSweepFile}}
      
      # Expand CIDRs to IPs (with safety limit)
      total_ips=0
      while IFS= read -r cidr; do
        [ -z "$cidr" ] && continue
        cidr_count=$(prips "$cidr" 2>/dev/null | wc -l)
        total_ips=$((total_ips + cidr_count))
        
        if [ $total_ips -gt {{ptrSweepMaxIPs}} ]; then
          echo "PTR sweep limit reached ({{ptrSweepMaxIPs}} IPs), skipping remaining" >> {{ptrSweepFile}}
          break
        fi
        
        # Reverse DNS lookup for each IP
        prips "$cidr" 2>/dev/null | while read ip; do
          ptr=$(dig +short -x "$ip" 2>/dev/null | head -1)
          if [ -n "$ptr" ] && echo "$ptr" | grep -qE "{{Target}}$"; then
            echo "$ptr" | sed 's/\.$//' >> {{ptrSweepFile}}
          fi
        done
      done < {{Output}}/ipspace/{{TargetSpace}}-range.txt
      
      # Filter and merge PTR subdomains
      if [ -s "{{ptrSweepFile}}" ]; then
        grep -E "{{Target}}$" {{ptrSweepFile}} | grep -E '^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$' | sort -u > {{ptrSweepFile}}.filtered || true
        mv {{ptrSweepFile}}.filtered {{ptrSweepFile}} 2>/dev/null || true
        cat {{ptrSweepFile}} >> {{subdomainFile}} 2>/dev/null || true
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 15: DNS Record Extraction (sub_dns equivalent)
  # ===========================================================================
  - name: dns-record-extraction
    type: bash
    pre_condition: '{{enableDnsRecordExtract}} && file_exists("{{subdomainFile}}")'
    log: "Extracting DNS records and discovering subdomains from them"
    command: |
      : > {{dnsRecordsFile}}
      : > {{dnsExtractedSubsFile}}
      
      # Query DNS records using dnsx
      if [ -s "{{subdomainFile}}" ]; then
        dnsx -r {{trustedResolvers}} -recon -silent -retry 3 -json  -o {{dnsRecordsFile}} < {{subdomainFile}} 2>/dev/null || true
      fi
      
      if [ -s "{{dnsRecordsFile}}" ]; then
        # Extract domains from DNS records
        jq -r '.. | strings | select(test("\\.{{Target}}$"))' {{dnsRecordsFile}} 2>/dev/null  | grep -E '^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$' | sort -u | anew -q {{dnsExtractedSubsFile}} || true
        
        # Extract IPs and do reverse lookup with hakip2host
        jq -r '.. | strings | select(test("^(\\d{1,3}\\.){3}\\d{1,3}$|^[0-9a-fA-F:]+$"))' {{dnsRecordsFile}} 2>/dev/null  | sort -u | hakip2host 2>/dev/null | awk '{print $3}' | unfurl -u domains | sed -e 's/^\*\.//' -e 's/\.$//' -e '/\./!d' | grep -E "\.{{Target}}$" | grep -E '^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$' | sort -u | anew -q {{dnsExtractedSubsFile}} || true
        
        # Use ip.thc.org API for additional domain discovery
        jq -r '.. | strings | select(test("^(\\d{1,3}\\.){3}\\d{1,3}$|^[0-9a-fA-F:]+$"))' {{dnsRecordsFile}} 2>/dev/null  | sort -u | while read ip; do
            [ -z "$ip" ] && continue
            curl -s "https://ip.thc.org/$ip" 2>/dev/null  | grep -E "\.{{Target}}$" | grep -E '^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$' | sort -u | anew -q {{dnsExtractedSubsFile}} || true
          done
      fi
      
      # Resolve extracted subdomains and merge
      if [ -s "{{dnsExtractedSubsFile}}" ]; then
        puredns resolve {{dnsExtractedSubsFile}} --wildcard-tests {{wildcardTests}}  -w {{Output}}/subdomain/dns-extracted-resolved-{{TargetSpace}}.txt --rate-limit {{massdnsRateBrute}} >/dev/null 2>&1 || true
        
        if [ -s "{{Output}}/subdomain/dns-extracted-resolved-{{TargetSpace}}.txt" ]; then
          cat {{Output}}/subdomain/dns-extracted-resolved-{{TargetSpace}}.txt >> {{subdomainFile}} 2>/dev/null || true
          sort -u {{subdomainFile}} -o {{subdomainFile}} 2>/dev/null || true
          rm -f {{Output}}/subdomain/dns-extracted-resolved-{{TargetSpace}}.txt
        fi
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 16: Recursive Bruteforce (sub_recursive_brute equivalent)
  # ===========================================================================
  - name: recursive-brute
    type: bash
    pre_condition: '{{enableRecursiveBrute}} && file_exists("{{subdomainFile}}") && file_length("{{subdomainFile}}") <= {{permLimit}}'
    log: "Running recursive bruteforce on discovered subdomains"
    command: |
      : > {{recursiveBruteFile}}
      
      if [ -s "{{subdomainFile}}" ]; then
        subdomain_count=$(wc -l < {{subdomainFile}} 2>/dev/null | tr -d ' ')

        if [ $subdomain_count -le {{permLimit}} ]; then
          # Get top subdomains for recursive brute
          dsieve -if {{subdomainFile}} -f 3 -top 20 > {{Output}}/subdomain/recursive_top.txt 2>/dev/null || head -n 20 {{subdomainFile}} > {{Output}}/subdomain/recursive_top.txt

          if [ -s "{{Output}}/subdomain/recursive_top.txt" ]; then
            # Brute force each subdomain
            while IFS= read -r sub; do
              [ -z "$sub" ] && continue
              puredns bruteforce {{dnsBruteForceWordlist}} "$sub"  --wildcard-tests {{wildcardTests}} -w {{Output}}/subdomain/brute_recursive_part.txt --rate-limit {{massdnsRateBrute}} >/dev/null 2>&1 || true
              
              if [ -s "{{Output}}/subdomain/brute_recursive_part.txt" ]; then
                cat {{Output}}/subdomain/brute_recursive_part.txt >> {{recursiveBruteFile}} 2>/dev/null || true
              fi
            done < {{Output}}/subdomain/recursive_top.txt
            
            # Generate permutations for recursive results
            if [ -s "{{recursiveBruteFile}}" ]; then
              gotator -sub {{recursiveBruteFile}} -perm {{permWordlists}} -silent 2>/dev/null  | head -c {{permLimit}} > {{Output}}/subdomain/recursive_perm.txt || true
              
              if [ -s "{{Output}}/subdomain/recursive_perm.txt" ]; then
                puredns resolve {{Output}}/subdomain/recursive_perm.txt  --wildcard-tests {{wildcardTests}} -w {{Output}}/subdomain/recursive_perm_resolved.txt --rate-limit {{massdnsRateBrute}} >/dev/null 2>&1 || true
                
                # Merge all recursive results
                cat {{recursiveBruteFile}} {{Output}}/subdomain/recursive_perm_resolved.txt 2>/dev/null  | sort -u > {{Output}}/subdomain/recursive_all.txt || true
                
                # Final resolve and merge
                if [ -s "{{Output}}/subdomain/recursive_all.txt" ]; then
                  puredns resolve {{Output}}/subdomain/recursive_all.txt  --wildcard-tests {{wildcardTests}} -w {{Output}}/subdomain/recursive_final.txt --rate-limit {{massdnsRateBrute}} >/dev/null 2>&1 || true
                  
                  if [ -s "{{Output}}/subdomain/recursive_final.txt" ]; then
                    cat {{Output}}/subdomain/recursive_final.txt >> {{subdomainFile}} 2>/dev/null || true
                    sort -u {{subdomainFile}} -o {{subdomainFile}} 2>/dev/null || true
                  fi
                fi
              fi
            fi
          fi
          
          # Cleanup temp files
          rm -f {{Output}}/subdomain/recursive_top.txt  {{Output}}/subdomain/brute_recursive_part.txt {{Output}}/subdomain/recursive_perm.txt {{Output}}/subdomain/recursive_perm_resolved.txt {{Output}}/subdomain/recursive_all.txt {{Output}}/subdomain/recursive_final.txt 2>/dev/null || true
        fi
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 17: Automatic ASN Discovery
  # ===========================================================================
  - name: asn-auto-discover
    type: bash
    pre_condition: '{{enableAsnAutoDiscover}}'
    log: "Running automatic ASN discovery from domain"
    command: |
      : > {{asnAutoFile}}
      : > {{Output}}/ipspace/{{TargetSpace}}-range.txt

      # Use asnmap to discover ASN info (reads PDCP_API_KEY from environment)
      asnmap -d {{Target}} -silent -j 2>/dev/null > {{asnAutoFile}} || true

      if [ -s "{{asnAutoFile}}" ]; then
        jq -r '.cidr // empty' {{asnAutoFile}} 2>/dev/null | sed '/^$/d' | sort -u > {{Output}}/ipspace/{{TargetSpace}}-range.txt || true
        jq -r '.as_number // empty' {{asnAutoFile}} 2>/dev/null | sed '/^$/d' | sort -u > {{Output}}/ipspace/asn-numbers-{{TargetSpace}}.txt || true
        jq -r '.domains[]? // empty' {{asnAutoFile}} 2>/dev/null | grep -E "\.{{Target}}$" | grep -E '^([a-zA-Z0-9][-a-zA-Z0-9]*\.)+[a-zA-Z]{2,}$' | sort -u >> {{subdomainFile}} 2>/dev/null || true

        # Use metabigor for additional IP range discovery if Org is set
        if [ -n "{{Org}}" ] && [ "{{Org}}" != "" ] && [ "{{Org}}" != "nil" ]; then
          echo "{{Org}}" | metabigor net --org -o {{Output}}/ipspace/{{TargetSpace}}-range-extra.txt 2>/dev/null || true
          [ -s "{{Output}}/ipspace/{{TargetSpace}}-range-extra.txt" ] && cat {{Output}}/ipspace/{{TargetSpace}}-range-extra.txt >> {{Output}}/ipspace/{{TargetSpace}}-range.txt 2>/dev/null && rm -f {{Output}}/ipspace/{{TargetSpace}}-range-extra.txt
        fi

        sort -u {{Output}}/ipspace/{{TargetSpace}}-range.txt -o {{Output}}/ipspace/{{TargetSpace}}-range.txt 2>/dev/null || true
        sort -u {{subdomainFile}} -o {{subdomainFile}} 2>/dev/null || true
      fi
    on_error:
      - action: continue

  # ===========================================================================
  # Phase 18: Cleanup
  # ===========================================================================
  - name: cleanup
    type: function
    log: "Cleaning up temp files"
    functions:
      - 'exec_cmd("rm -rf {{Output}}/probing/subbrute-{{TargetSpace}}.txt {{Output}}/probing/permutations-{{TargetSpace}}.txt {{Output}}/probing/subwiz-resolved-{{TargetSpace}}.txt {{Output}}/probing/regulator-resolved-{{TargetSpace}}.txt {{Output}}/probing/brute-perm-{{TargetSpace}}.txt {{Output}}/probing/resolved-brute-perm-{{TargetSpace}}.txt 2>/dev/null || true")'
    on_error:
      - action: continue

  # ===========================================================================
  # Summary
  # ===========================================================================
  - name: summary
    type: function
    log: "DNS resolution and IP space summary"
    functions:
      - 'db_total_subdomains("{{dnsFile}}")'
      - 'db_total_assets("{{resolvedFile}}")'
